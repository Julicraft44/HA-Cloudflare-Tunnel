name: Update HA base image version

on:
  schedule:
    # Runs every Monday at 07:30 UTC (30 min after cloudflared check)
    - cron: "30 7 * * 1"
  workflow_dispatch:

jobs:
  update:
    name: Check and update HA base image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Get latest Alpine version
        id: latest
        run: |
          # ghcr.io/home-assistant/base:3.X is tagged after the Alpine version it is built on.
          # Querying Alpine's Docker Hub tags gives us the correct version number to pin.
          LATEST=$(curl -fsSL \
            "https://hub.docker.com/v2/repositories/library/alpine/tags?page_size=100&ordering=last_updated" \
            | python3 -c 'import json,sys,re;d=json.load(sys.stdin);v=sorted([t["name"] for t in d["results"] if re.match(r"^[0-9]+\.[0-9]+$",t["name"])],key=lambda x:[int(i) for i in x.split(".")]);print(v[-1])')
          echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Latest Alpine: ${LATEST}"

      - name: Get currently pinned version
        id: current
        run: |
          VERSION=$(grep -oP 'ghcr\.io/home-assistant/base:\K[0-9]+\.[0-9]+' cloudflare_tunnel/Dockerfile)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Current: ${VERSION}"

      - name: Skip if already up to date
        if: steps.latest.outputs.version == steps.current.outputs.version
        run: echo "Already on ${{ steps.current.outputs.version }}. Nothing to do."

      - name: Update Dockerfile
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          sed -i \
            "s|ghcr.io/home-assistant/base:[0-9.]*|ghcr.io/home-assistant/base:${{ steps.latest.outputs.version }}|" \
            cloudflare_tunnel/Dockerfile
          echo "Updated to ${{ steps.latest.outputs.version }}"

      - name: Build and smoke-test image
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          docker build \
            --build-arg BUILD_ARCH=amd64 \
            --build-arg BUILD_VERSION=ci \
            -t ha-cft:ci \
            cloudflare_tunnel/
          docker run --rm ha-cft:ci cloudflared --version
          docker run --rm ha-cft:ci sh -c \
            'test -x /etc/services.d/cloudflare_tunnel/run && \
             test -x /etc/services.d/cloudflare_tunnel_monitor/run && \
             test -x /healthcheck.sh && \
             test -f /monitor.py'
          echo "Smoke test passed."

      - name: Bump add-on version patch
        id: bump
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          CURRENT_ADDON=$(grep -oP 'version: "\K[^"]+' cloudflare_tunnel/config.yaml)
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT_ADDON}"
          NEW_ADDON="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/version: \"${CURRENT_ADDON}\"/version: \"${NEW_ADDON}\"/" cloudflare_tunnel/config.yaml
          echo "Add-on version bumped: ${CURRENT_ADDON} → ${NEW_ADDON}"
          echo "addon_version=${NEW_ADDON}" >> "$GITHUB_OUTPUT"

      - name: Prepend changelog entry
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          NEW_ENTRY="## ${{ steps.bump.outputs.addon_version }}\n\n- Update base image to Alpine ${{ steps.latest.outputs.version }}\n"
          OLD=$(cat cloudflare_tunnel/CHANGELOG.md)
          printf "%b\n%s" "${NEW_ENTRY}" "${OLD}" > cloudflare_tunnel/CHANGELOG.md

      - name: Open pull request
        if: steps.latest.outputs.version != steps.current.outputs.version
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update base image to Alpine ${{ steps.latest.outputs.version }}"
          branch: "update/alpine-${{ steps.latest.outputs.version }}"
          delete-branch: true
          title: "Update base image to Alpine ${{ steps.latest.outputs.version }}"
          body: |
            Automated dependency update.

            | | Version |
            |---|---|
            | **Alpine** (before) | `${{ steps.current.outputs.version }}` |
            | **Alpine** (after)  | `${{ steps.latest.outputs.version }}` |

            `ghcr.io/home-assistant/base` is tagged after the Alpine version it is built on — this also pulls in the latest HA base image release for that Alpine version.

            ---
            *This PR was created automatically by the `update-base-image` workflow.*
          labels: "dependencies,automated"
